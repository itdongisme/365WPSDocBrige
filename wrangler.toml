name = "wps-docs-downloader"
main = "worker.js"
compatibility_date = "2025-01-20"

[vars]
WPS_GROUP_ID = ""
WPS_CORP_ID = ""
WPS_COOKIES = ""
# 可选：网站访问密码保护
ACCESS_PASSWORD = ""
# 可选：直接下载认证密码（额外的安全层）
DIRECT_DOWNLOAD_PASSWORD = ""

# R2 存储桶配置（用于文件缓存）
[[r2_buckets]]
binding = "FILE_CACHE"
bucket_name = "wps-file-cache"

# KV 命名空间配置（用于 LRU 链表和元数据）
[[kv_namespaces]]
binding = "CACHE_KV"
id = "your-kv-namespace-id"

# 开发环境配置
[env.development]
name = "wps-docs-downloader-dev"

[[env.development.r2_buckets]]
binding = "FILE_CACHE"
bucket_name = "wps-file-cache-dev"

[[env.development.kv_namespaces]]
binding = "CACHE_KV"
id = "your-dev-kv-namespace-id"